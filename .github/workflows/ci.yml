name: CI Pipeline

on:
  push:
    branches: [testing]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install validators
        run: |
          npm install -g htmlhint stylelint eslint

      - name: Validate HTML
        run: htmlhint .

      - name: Validate CSS
        run: stylelint "**/*.css"

      - name: Validate JS
        run: eslint .

      - name: Success message
        run: echo "✅ Code is valid. Ready to merge."

  merge:
    needs: validate
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Merge testing → main
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin
          git checkout main
          git merge origin/testing
          git push origin main